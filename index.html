<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>况两把 · 猜球员</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b2a;--surface:#162032;--surface2:#1e2d3d;--border:#2a3f55;
  --green:#22c55e;--green-bg:#14532d;
  --yellow:#f59e0b;--yellow-bg:#78350f;
  --red-bg:#1f2937;--text:#e2e8f0;--muted:#64748b;--accent:#38bdf8;
}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:20px 16px 60px}
.header{text-align:center;margin-bottom:14px}
.logo{font-size:2rem;font-weight:900;color:var(--green);letter-spacing:3px;text-shadow:0 0 30px rgba(34,197,94,.3)}
.subtitle{color:var(--muted);font-size:.76rem;margin-top:3px;letter-spacing:1px}
.header-btns{margin-top:10px;display:flex;gap:8px;justify-content:center}
.hbtn{padding:5px 14px;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;
  border:1px solid var(--border);background:var(--surface2);color:var(--muted);
  font-family:inherit;transition:all .15s}
.hbtn:hover{border-color:var(--accent);color:var(--accent)}
.timer-wrap{width:100%;max-width:440px;margin-bottom:12px}
.timer-bar-bg{background:var(--surface2);border-radius:99px;height:8px;overflow:hidden}
.timer-bar{height:100%;border-radius:99px;transition:width .25s linear,background .5s;background:var(--green)}
.timer-label{display:flex;justify-content:space-between;font-size:.74rem;color:var(--muted);margin-top:4px}
.timer-num{font-weight:700;font-size:.86rem;color:var(--text)}
.stats-bar{display:flex;gap:18px;margin-bottom:12px;font-size:.8rem;color:var(--muted)}
.stat-val{color:var(--text);font-weight:700}
.legend{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.68rem;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.search-wrap{position:relative;width:100%;max-width:440px;margin-bottom:10px}
.search-input{width:100%;padding:11px 16px;background:var(--surface2);border:2px solid var(--border);
  border-radius:10px;color:var(--text);font-size:.93rem;outline:none;
  transition:border-color .2s,box-shadow .2s;font-family:inherit}
.search-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.search-input::placeholder{color:var(--muted)}
.search-input:disabled{opacity:.5;cursor:not-allowed}
.autocomplete{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);
  border:1px solid var(--border);border-radius:10px;overflow-y:auto;max-height:280px;
  z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.4);display:none}
.ac-item{padding:9px 16px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;font-size:.85rem;transition:background .12s}
.ac-item:hover,.ac-item.ac-active{background:var(--border)}
.ac-item.ac-active{border-left:3px solid var(--green)}
.ac-item.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.ac-meta{font-size:.7rem;color:var(--muted);margin-left:8px;white-space:nowrap}
.ac-en{color:var(--muted);font-size:.72rem;margin-left:5px}
.guess-btn{width:100%;max-width:440px;padding:11px;background:var(--green);color:#0a1a0a;
  border:none;border-radius:10px;font-size:.93rem;font-weight:800;letter-spacing:1px;
  cursor:pointer;margin-bottom:16px;transition:background .2s,transform .1s;font-family:inherit}
.guess-btn:hover:not(:disabled){background:#16a34a;transform:translateY(-1px)}
.guess-btn:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;transform:none}
.message{padding:11px 18px;border-radius:10px;font-size:.9rem;font-weight:700;
  text-align:center;margin-bottom:10px;max-width:440px;width:100%;display:none}
.message.win    {background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.message.lose   {background:#450a0a;color:#f87171;border:1px solid #f87171}
.message.timeout{background:#1c1a00;color:var(--yellow);border:1px solid var(--yellow)}
.answer-reveal{display:none;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px 18px;max-width:440px;width:100%;margin-bottom:12px;text-align:center}
.ar-label{font-size:.66rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.ar-name{font-size:1.2rem;font-weight:900;color:var(--green)}
.ar-en  {font-size:.78rem;color:var(--muted);margin-top:2px}
.ar-detail{font-size:.76rem;color:var(--muted);margin-top:4px}
.action-btns{display:none;gap:10px;margin-bottom:18px}
.btn-new{padding:8px 24px;border-radius:8px;font-size:.83rem;font-weight:700;cursor:pointer;
  border:none;background:var(--green);color:#0a1a0a;font-family:inherit;transition:opacity .2s}
.btn-new:hover{opacity:.85}
.table-wrap{width:100%;max-width:840px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.guesses-table{width:100%;border-collapse:separate;border-spacing:0 4px;min-width:600px}
.guesses-table thead th{color:var(--muted);font-size:.65rem;text-transform:uppercase;
  letter-spacing:1.5px;padding:0 6px 7px;text-align:center;font-weight:600}
.guesses-table thead th:first-child{text-align:left}
.guess-row{animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.guess-row td{padding:8px 7px;text-align:center;font-size:.77rem;font-weight:700}
.guess-row td:first-child{text-align:left;padding-left:13px;border-radius:8px 0 0 8px;
  background:var(--surface);font-size:.8rem;white-space:nowrap;min-width:120px}
.guess-row td:last-child{border-radius:0 8px 8px 0}
.cell-correct{background:var(--green-bg);color:var(--green)}
.cell-close  {background:var(--yellow-bg);color:var(--yellow)}
.cell-wrong  {background:var(--red-bg);color:var(--muted)}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  10%,50%,90%{transform:translateX(-4px)}
  30%,70%{transform:translateX(4px)}
}
.shake{animation:shake .4s ease}
@keyframes popCorrect{
  0%{transform:scale(1)}
  50%{transform:scale(1.15)}
  100%{transform:scale(1)}
}
.pop{animation:popCorrect .35s ease}

/* ── 滚动提示 ── */
.scroll-hint{display:none;text-align:center;color:var(--muted);font-size:.68rem;margin-bottom:6px}
@media(max-width:700px){.scroll-hint{display:block}}

/* ── Modal 通用 ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;
  display:none;align-items:flex-start;justify-content:center;padding:20px 10px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  width:100%;max-width:980px;margin:auto;display:flex;flex-direction:column;max-height:90vh}
.modal-header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:1rem;font-weight:800}
.modal-count{font-size:.74rem;color:var(--muted);margin-left:8px}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.4rem;
  cursor:pointer;line-height:1;padding:0 4px;transition:color .15s}
.modal-close:hover{color:var(--text)}
.modal-filters{padding:10px 16px;border-bottom:1px solid var(--border);
  display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0;align-items:center}
.modal-search{flex:1;min-width:120px;padding:7px 11px;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;color:var(--text);
  font-size:.8rem;outline:none;font-family:inherit}
.modal-search:focus{border-color:var(--green)}
.modal-search::placeholder{color:var(--muted)}
.fsel{padding:7px 9px;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:.78rem;outline:none;font-family:inherit;cursor:pointer}
.fsel:focus{border-color:var(--accent)}
.range-group{display:flex;align-items:center;gap:4px;background:var(--surface2);
  border:1px solid var(--border);border-radius:8px;padding:4px 9px}
.range-label{font-size:.72rem;color:var(--muted);white-space:nowrap;margin-right:2px}
.range-input{width:46px;background:transparent;border:none;outline:none;color:var(--text);
  font-size:.78rem;font-family:inherit;text-align:center;-moz-appearance:textfield}
.range-input::-webkit-outer-spin-button,.range-input::-webkit-inner-spin-button{-webkit-appearance:none}
.range-input::placeholder{color:var(--muted)}
.range-sep{color:var(--muted);font-size:.75rem}
.range-unit{font-size:.7rem;color:var(--muted)}
.filter-clear{padding:7px 11px;background:none;border:1px solid var(--border);
  border-radius:8px;color:var(--muted);font-size:.74rem;cursor:pointer;
  font-family:inherit;transition:all .15s}
.filter-clear:hover{border-color:#f87171;color:#f87171}
.modal-sortbar{padding:7px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap}
.sort-label{font-size:.72rem;color:var(--muted);white-space:nowrap;margin-right:2px}
.sort-btn{padding:4px 11px;background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;color:var(--muted);font-size:.72rem;cursor:pointer;font-family:inherit;
  transition:all .15s;white-space:nowrap}
.sort-btn.active,.sort-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,.07)}
.modal-body{overflow-y:auto;padding:12px 16px;flex:1}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:7px}
.player-card{background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  padding:9px 11px;transition:border-color .15s}
.player-card:hover{border-color:var(--green)}
.pc-name{font-size:.86rem;font-weight:800}
.pc-en{font-size:.65rem;color:var(--muted);margin-top:2px;line-height:1.3}
.pc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.pc-tag{font-size:.6rem;font-weight:700;padding:2px 5px;border-radius:4px;
  background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.pc-tag.pos-GK {color:#a78bfa;border-color:#4c1d95}
.pc-tag.pos-DEF{color:#60a5fa;border-color:#1e3a5f}
.pc-tag.pos-MID{color:#34d399;border-color:#064e3b}
.pc-tag.pos-FW {color:#fb923c;border-color:#431407}
.pc-tag.retired{color:var(--muted);font-style:italic}
.modal-empty{text-align:center;color:var(--muted);padding:40px 0;font-size:.85rem}

/* ── 战绩 Modal ── */
.stats-modal{max-width:380px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.stats-box{text-align:center;padding:10px 4px;background:var(--surface2);border-radius:8px;
  border:1px solid var(--border)}
.stats-box-val{font-size:1.3rem;font-weight:900;color:var(--green)}
.stats-box-label{font-size:.62rem;color:var(--muted);margin-top:3px;letter-spacing:.5px}
.dist-title{font-size:.72rem;color:var(--muted);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.dist-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.dist-num{width:14px;text-align:right;font-size:.75rem;font-weight:700;color:var(--muted);flex-shrink:0}
.dist-bar-bg{flex:1;background:var(--bg);border-radius:4px;height:20px;overflow:hidden}
.dist-bar{height:100%;border-radius:4px;background:var(--border);display:flex;align-items:center;
  justify-content:flex-end;padding:0 6px;min-width:20px;transition:width .4s ease}
.dist-bar.best{background:var(--green)}
.dist-bar-count{font-size:.68rem;font-weight:700;color:var(--text)}
.stats-footer{margin-top:18px;display:flex;gap:8px;justify-content:center}
.btn-stats-clear{padding:7px 18px;border-radius:8px;font-size:.76rem;font-weight:700;
  cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);
  font-family:inherit;transition:all .15s}
.btn-stats-clear:hover{border-color:#f87171;color:#f87171}
</style>
</head>
<body>

<div class="header">
  <div class="logo">况两把</div>
  <div class="subtitle">猜出神秘球员 · 6次机会 · 200秒</div>
  <div class="header-btns">
    <button class="hbtn" onclick="openModal()">📋 球员库</button>
    <button class="hbtn" onclick="openStatsModal()">📊 战绩</button>
  </div>
</div>

<div class="timer-wrap">
  <div class="timer-bar-bg"><div class="timer-bar" id="timerBar"></div></div>
  <div class="timer-label">
    <span>剩余时间</span><span class="timer-num"><span id="timerNum">200</span>s</span>
  </div>
</div>

<div class="stats-bar">
  <span>剩余机会 <span class="stat-val" id="remaining">6</span></span>
  <span>已猜 <span class="stat-val" id="guessCount">0</span></span>
  <span id="todayLabel"></span>
  <span id="historyLabel"></span>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--green-bg);border:1px solid var(--green)"></div>完全正确</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--yellow-bg);border:1px solid var(--yellow)"></div>接近 (±5cm / ±5号)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--red-bg);border:1px solid var(--border)"></div>错误</div>
</div>

<div class="search-wrap">
  <input id="searchInput" class="search-input" type="text" placeholder="输入中文或英文名字搜索…" autocomplete="off" spellcheck="false">
  <div class="autocomplete" id="autocomplete"></div>
</div>
<button class="guess-btn" id="guessBtn" disabled>猜一猜</button>

<div class="message" id="message"></div>
<div class="answer-reveal" id="answerReveal">
  <div class="ar-label">正确答案</div>
  <div class="ar-name" id="arName"></div>
  <div class="ar-en"   id="arEn"></div>
  <div class="ar-detail" id="arDetail"></div>
</div>
<div class="action-btns" id="actionBtns">
  <button class="btn-new" onclick="startNewGame()">新开一局</button>
</div>

<div class="scroll-hint">← 左右滑动查看更多 →</div>
<div class="table-wrap">
  <table class="guesses-table">
    <thead><tr>
      <th style="text-align:left">球员</th>
      <th>身高</th><th>位置</th><th>球队</th><th>国籍</th><th>状态</th><th>号码</th>
    </tr></thead>
    <tbody id="guessesBody">
      <tr><td colspan="7" class="empty-state">⬆ 开始猜测吧</td></tr>
    </tbody>
  </table>
</div>

<!-- 球员库 Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div><span class="modal-title">球员库</span><span class="modal-count" id="modalCount"></span></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-filters">
      <input class="modal-search" id="modalSearch" type="text" placeholder="搜索中文/英文…" autocomplete="off" oninput="renderModal()">
      <select class="fsel" id="fPos" onchange="renderModal()">
        <option value="">全部位置</option>
        <option value="GK">门将</option>
        <option value="DEF">后卫</option>
        <option value="MID">中场</option>
        <option value="FW">前锋</option>
      </select>
      <select class="fsel" id="fStatus" onchange="renderModal()">
        <option value="">现役+退役</option>
        <option value="现役">现役</option>
        <option value="退役">退役</option>
      </select>
      <select class="fsel" id="fNat" onchange="renderModal()" style="min-width:96px">
        <option value="">全部国籍</option>
      </select>
      <div class="range-group">
        <span class="range-label">身高</span>
        <input class="range-input" id="fHMin" type="number" placeholder="≥" min="150" max="220" oninput="renderModal()">
        <span class="range-sep">–</span>
        <input class="range-input" id="fHMax" type="number" placeholder="≤" min="150" max="220" oninput="renderModal()">
        <span class="range-unit">cm</span>
      </div>
      <div class="range-group">
        <span class="range-label">号码</span>
        <input class="range-input" id="fNMin" type="number" placeholder="≥" min="1" max="99" oninput="renderModal()">
        <span class="range-sep">–</span>
        <input class="range-input" id="fNMax" type="number" placeholder="≤" min="1" max="99" oninput="renderModal()">
      </div>
      <button class="filter-clear" onclick="clearFilters()">重置</button>
    </div>
    <div class="modal-sortbar">
      <span class="sort-label">排序：</span>
      <button class="sort-btn active" id="sortName"   onclick="setSort('name')">姓名</button>
      <button class="sort-btn"        id="sortHeight" onclick="setSort('height')">身高 ↕</button>
      <button class="sort-btn"        id="sortNumber" onclick="setSort('number')">号码 ↕</button>
      <button class="sort-btn"        id="sortPos"    onclick="setSort('pos')">位置</button>
    </div>
    <div class="modal-body">
      <div class="player-grid" id="playerGrid"></div>
    </div>
  </div>
</div>

<!-- 战绩 Modal -->
<div class="modal-overlay" id="statsOverlay" onclick="statsOverlayClick(event)">
  <div class="modal stats-modal">
    <div class="modal-header">
      <span class="modal-title">游戏战绩</span>
      <button class="modal-close" onclick="closeStatsModal()">✕</button>
    </div>
    <div class="modal-body" id="statsBody"></div>
  </div>
</div>

<script src="players.js"></script>
<script>
const MAX_G=6, TIME=200;
const POS={GK:'门将',DEF:'后卫',MID:'中场',FW:'前锋'};
const STATS_KEY='pg_stats';

/* ════ 战绩系统 ════ */
function defaultStats(){
  return {played:0,won:0,currentStreak:0,maxStreak:0,dist:[0,0,0,0,0,0]};
}
function loadStats(){
  try{const s=localStorage.getItem(STATS_KEY);return s?JSON.parse(s):defaultStats();}
  catch(e){return defaultStats();}
}
function saveStats(s){try{localStorage.setItem(STATS_KEY,JSON.stringify(s));}catch(e){}}

function recordResult(won,guessNum){
  const s=loadStats();
  s.played++;
  if(won){
    s.won++;
    s.currentStreak++;
    if(s.currentStreak>s.maxStreak) s.maxStreak=s.currentStreak;
    if(guessNum>=1&&guessNum<=6) s.dist[guessNum-1]++;
  } else {
    s.currentStreak=0;
  }
  saveStats(s);
  renderHistoryLabel();
}
function clearAllStats(){
  if(!confirm('确定要清空所有游戏记录吗？')) return;
  localStorage.removeItem(STATS_KEY);
  renderHistoryLabel();
  renderStatsBody();
}
function renderHistoryLabel(){
  const s=loadStats();
  const el=document.getElementById('historyLabel');
  if(s.played===0){el.textContent='';return;}
  const rate=Math.round(s.won/s.played*100);
  el.innerHTML=`战绩 <span class="stat-val">${s.won}</span>/<span class="stat-val">${s.played}</span> (${rate}%)`;
}

/* ── 战绩 Modal ── */
function openStatsModal(){
  renderStatsBody();
  document.getElementById('statsOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeStatsModal(){
  document.getElementById('statsOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function statsOverlayClick(e){if(e.target===document.getElementById('statsOverlay'))closeStatsModal();}

function renderStatsBody(){
  const s=loadStats();
  const rate=s.played?Math.round(s.won/s.played*100):0;
  const maxDist=Math.max(...s.dist,1);
  const bestIdx=s.dist.indexOf(Math.max(...s.dist));

  let html=`
    <div class="stats-grid">
      <div class="stats-box"><div class="stats-box-val">${s.played}</div><div class="stats-box-label">已玩</div></div>
      <div class="stats-box"><div class="stats-box-val">${rate}%</div><div class="stats-box-label">胜率</div></div>
      <div class="stats-box"><div class="stats-box-val">${s.currentStreak}</div><div class="stats-box-label">当前连胜</div></div>
      <div class="stats-box"><div class="stats-box-val">${s.maxStreak}</div><div class="stats-box-label">最佳连胜</div></div>
    </div>
    <div class="dist-title">猜测分布</div>`;

  for(let i=0;i<6;i++){
    const pct=Math.max(Math.round(s.dist[i]/maxDist*100),8);
    const isBest=s.dist[i]>0&&i===bestIdx;
    html+=`<div class="dist-row">
      <span class="dist-num">${i+1}</span>
      <div class="dist-bar-bg"><div class="dist-bar${isBest?' best':''}" style="width:${pct}%">
        <span class="dist-bar-count">${s.dist[i]}</span>
      </div></div>
    </div>`;
  }

  html+=`<div class="stats-footer">
    <button class="btn-stats-clear" onclick="clearAllStats()">清空记录</button>
  </div>`;

  document.getElementById('statsBody').innerHTML=html;
}

/* ════ 游戏逻辑 ════ */
let guesses=[],selectedP=null,gameOver=false,answer=null;
let timerInterval=null,gameStartTime=null,timeLeft=TIME,sortMode='name';
let acIdx=-1;

function startNewGame(){
  guesses=[];selectedP=null;gameOver=false;acIdx=-1;
  answer=PLAYERS[Math.floor(Math.random()*PLAYERS.length)];
  document.getElementById('guessesBody').innerHTML='<tr><td colspan="7" class="empty-state">⬆ 开始猜测吧</td></tr>';
  searchInput.value='';searchInput.disabled=false;
  document.getElementById('guessBtn').disabled=true;
  document.getElementById('message').style.display='none';
  document.getElementById('answerReveal').style.display='none';
  document.getElementById('actionBtns').style.display='none';
  acList.style.display='none';
  updateGameStats();resetTimer();startTimer();
}
function updateGameStats(){
  document.getElementById('remaining').textContent=MAX_G-guesses.length;
  document.getElementById('guessCount').textContent=guesses.length;
  const d=new Date();
  document.getElementById('todayLabel').textContent=
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

/* ── 计时器（基于 Date.now 防漂移） ── */
function resetTimer(){clearInterval(timerInterval);timerInterval=null;timeLeft=TIME;renderTimer();}
function startTimer(){
  gameStartTime=Date.now();
  timerInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-gameStartTime)/1000);
    timeLeft=Math.max(0,TIME-elapsed);
    renderTimer();
    if(timeLeft<=0){clearInterval(timerInterval);onTimeout();}
  },250);
}
function renderTimer(){
  const pct=Math.max(0,timeLeft/TIME*100);
  const bar=document.getElementById('timerBar');
  bar.style.width=pct+'%';
  bar.style.background=timeLeft>80?'var(--green)':timeLeft>40?'var(--yellow)':'#ef4444';
  document.getElementById('timerNum').textContent=Math.max(0,timeLeft);
}
function onTimeout(){
  if(gameOver)return;gameOver=true;
  showMsg('⏰ 时间到！','timeout');revealAnswer();endGame(false);
}

/* ── 搜索 + 键盘导航 ── */
const searchInput=document.getElementById('searchInput');
const acList=document.getElementById('autocomplete');
function norm(s){
  return s.toLowerCase()
    .replace(/[àáâã]/g,'a').replace(/[éèêë]/g,'e').replace(/[íîï]/g,'i')
    .replace(/[óôõ]/g,'o').replace(/[úûü]/g,'u').replace(/ñ/g,'n')
    .replace(/[ćč]/g,'c').replace(/[šś]/g,'s').replace(/[žź]/g,'z')
    .replace(/[^a-z0-9\u4e00-\u9fff]/g,'');
}
function matchScore(p,q){
  const qq=norm(q);if(!qq)return 0;
  const cn=norm(p.name),en=norm(p.nameEN);
  if(cn===qq||en===qq)return 5;
  if(cn.includes(qq))return 4;
  if(en.startsWith(qq))return 3;
  if(en.includes(qq))return 2;
  if(p.nameEN.toLowerCase().split(' ').some(w=>norm(w).startsWith(qq)))return 2;
  return 0;
}

let acItems=[];
function renderAC(){
  const q=searchInput.value.trim();
  acIdx=-1;
  if(!q||gameOver){acList.style.display='none';acItems=[];return;}
  const done=new Set(guesses.map(g=>g.name));
  acItems=PLAYERS.map(p=>({p,sc:matchScore(p,q)}))
    .filter(r=>r.sc>0)
    .sort((a,b)=>b.sc-a.sc||a.p.name.localeCompare(b.p.name,'zh'))
    .slice(0,10);
  if(!acItems.length){acList.style.display='none';return;}
  acList.innerHTML=acItems.map(({p},i)=>{
    const d=done.has(p.name);
    return `<div class="ac-item${d?' disabled':''}" data-idx="${i}">
      <span>${p.name}<span class="ac-en">${p.nameEN}</span></span>
      <span class="ac-meta">${p.team}·${p.nationality}</span>
    </div>`;
  }).join('');
  acList.style.display='block';
}

acList.addEventListener('click',e=>{
  const item=e.target.closest('.ac-item');
  if(!item||item.classList.contains('disabled'))return;
  const idx=parseInt(item.dataset.idx);
  if(idx>=0&&idx<acItems.length) doSelect(acItems[idx].p);
});

function doSelect(p){
  selectedP=p;searchInput.value=p.name;
  acList.style.display='none';acItems=[];acIdx=-1;
  document.getElementById('guessBtn').disabled=gameOver;
}

function highlightAC(){
  acList.querySelectorAll('.ac-item').forEach((el,i)=>{
    el.classList.toggle('ac-active',i===acIdx);
  });
  if(acIdx>=0){
    const el=acList.children[acIdx];
    if(el) el.scrollIntoView({block:'nearest'});
  }
}

searchInput.addEventListener('input',()=>{selectedP=null;document.getElementById('guessBtn').disabled=true;renderAC();});

searchInput.addEventListener('keydown',e=>{
  if(acList.style.display==='block'&&acItems.length>0){
    if(e.key==='ArrowDown'){
      e.preventDefault();
      acIdx=Math.min(acIdx+1,acItems.length-1);
      while(acIdx<acItems.length-1&&guesses.find(g=>g.name===acItems[acIdx].p.name)) acIdx++;
      highlightAC();return;
    }
    if(e.key==='ArrowUp'){
      e.preventDefault();
      acIdx=Math.max(acIdx-1,0);
      while(acIdx>0&&guesses.find(g=>g.name===acItems[acIdx].p.name)) acIdx--;
      highlightAC();return;
    }
  }
  if(e.key==='Enter'){
    e.preventDefault();
    if(acIdx>=0&&acIdx<acItems.length&&!guesses.find(g=>g.name===acItems[acIdx].p.name)){
      doSelect(acItems[acIdx].p);
    }
    if(selectedP&&!gameOver) submitGuess();
  }
  if(e.key==='Escape'){acList.style.display='none';acIdx=-1;}
});

document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap')){acList.style.display='none';acIdx=-1;}});
document.getElementById('guessBtn').addEventListener('click',submitGuess);

/* ── 提交 ── */
function submitGuess(){
  if(!selectedP||gameOver)return;
  if(guesses.find(g=>g.name===selectedP.name))return;
  guesses.push(selectedP);
  if(guesses.length===1)document.getElementById('guessesBody').innerHTML='';
  const row=prependRow(selectedP);
  updateGameStats();

  const isCorrect=selectedP.name===answer.name;

  if(isCorrect){
    clearInterval(timerInterval);
    showMsg(`🎉 正确！第${guesses.length}次猜中 ${answer.name}！`,'win');
    gameOver=true;endGame(true);
    if(row) row.classList.add('pop');
  } else if(guesses.length>=MAX_G){
    clearInterval(timerInterval);
    showMsg('😢 次数用完！','lose');
    revealAnswer();gameOver=true;endGame(false);
  } else {
    if(row){row.classList.add('shake');row.addEventListener('animationend',()=>row.classList.remove('shake'),{once:true});}
  }

  selectedP=null;searchInput.value='';
  document.getElementById('guessBtn').disabled=true;
  acList.style.display='none';acItems=[];acIdx=-1;

  if(gameOver) searchInput.disabled=true;
}
function showMsg(t,type){
  const el=document.getElementById('message');
  el.textContent=t;el.className='message '+type;el.style.display='block';
}
function revealAnswer(){
  document.getElementById('arName').textContent=answer.name;
  document.getElementById('arEn').textContent=answer.nameEN;
  document.getElementById('arDetail').textContent=
    `${answer.team} · ${answer.nationality} · ${POS[answer.position]} · ${answer.height}cm · #${answer.number} · ${answer.status}`;
  document.getElementById('answerReveal').style.display='block';
}
function endGame(won){
  document.getElementById('actionBtns').style.display='flex';
  recordResult(won,guesses.length);
}

/* ── 反馈行 ── */
function cmpH(g,a){
  if(g===a)return{cls:'correct',label:`${g}cm`};
  return{cls:Math.abs(g-a)<=5?'close':'wrong',label:`${g}cm${g<a?' ↑':' ↓'}`};
}
function cmpN(g,a){
  if(g===a)return{cls:'correct',label:`#${g}`};
  return{cls:Math.abs(g-a)<=5?'close':'wrong',label:`#${g}${g<a?' ↑':' ↓'}`};
}
function cmpE(g,a,lb){return{cls:g===a?'correct':'wrong',label:lb||g};}
function prependRow(p){
  const tbody=document.getElementById('guessesBody');
  const tr=document.createElement('tr');tr.className='guess-row';
  [{cls:'',label:p.name},
   cmpH(p.height,answer.height),
   cmpE(p.position,answer.position,POS[p.position]),
   cmpE(p.team,answer.team),
   cmpE(p.nationality,answer.nationality),
   cmpE(p.status,answer.status),
   cmpN(p.number,answer.number)
  ].forEach((c,i)=>{
    const td=document.createElement('td');
    td.innerHTML=c.label;
    if(i>0)td.className='cell-'+c.cls;
    tr.appendChild(td);
  });
  tbody.insertBefore(tr,tbody.firstChild);
  tr.scrollIntoView({behavior:'smooth',block:'nearest'});
  return tr;
}

/* ════ 球员库弹窗 ════ */
function openModal(){
  const natSel=document.getElementById('fNat');
  const nats=[...new Set(PLAYERS.map(p=>p.nationality))].sort((a,b)=>a.localeCompare(b,'zh'));
  natSel.innerHTML='<option value="">全部国籍</option>'+nats.map(n=>`<option value="${n}">${n}</option>`).join('');
  renderModal();
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function overlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function clearFilters(){
  ['modalSearch','fHMin','fHMax','fNMin','fNMax'].forEach(id=>document.getElementById(id).value='');
  ['fPos','fStatus','fNat'].forEach(id=>document.getElementById(id).value='');
  renderModal();
}
const sortDir={name:1,height:-1,number:1,pos:1};
function setSort(mode){
  if(sortMode===mode) sortDir[mode]*=-1;
  sortMode=mode;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  const id='sort'+mode.charAt(0).toUpperCase()+mode.slice(1);
  const btn=document.getElementById(id);
  if(btn) btn.classList.add('active');
  if(mode==='height') document.getElementById('sortHeight').textContent='身高 '+(sortDir.height===-1?'↓':'↑');
  if(mode==='number') document.getElementById('sortNumber').textContent='号码 '+(sortDir.number===1?'↑':'↓');
  renderModal();
}
function renderModal(){
  const q=norm(document.getElementById('modalSearch').value.trim());
  const pos=document.getElementById('fPos').value;
  const sta=document.getElementById('fStatus').value;
  const nat=document.getElementById('fNat').value;
  const hMin=parseInt(document.getElementById('fHMin').value)||0;
  const hMax=parseInt(document.getElementById('fHMax').value)||999;
  const nMin=parseInt(document.getElementById('fNMin').value)||0;
  const nMax=parseInt(document.getElementById('fNMax').value)||999;
  const seen=new Set();
  let list=PLAYERS.filter(p=>{
    if(seen.has(p.name))return false; seen.add(p.name);
    if(pos&&p.position!==pos)return false;
    if(sta&&p.status!==sta)return false;
    if(nat&&p.nationality!==nat)return false;
    if(p.height<hMin||p.height>hMax)return false;
    if(p.number<nMin||p.number>nMax)return false;
    if(q){const cn=norm(p.name),en=norm(p.nameEN);if(!cn.includes(q)&&!en.includes(q))return false;}
    return true;
  });
  if(sortMode==='height') list.sort((a,b)=>sortDir.height*(a.height-b.height));
  else if(sortMode==='number') list.sort((a,b)=>sortDir.number*(a.number-b.number));
  else if(sortMode==='pos'){
    const ord={GK:0,DEF:1,MID:2,FW:3};
    list.sort((a,b)=>ord[a.position]-ord[b.position]||a.name.localeCompare(b.name,'zh'));
  } else list.sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  document.getElementById('modalCount').textContent=`共 ${list.length} 人`;
  const grid=document.getElementById('playerGrid');
  if(!list.length){grid.innerHTML='<div class="modal-empty">没有符合条件的球员</div>';return;}
  grid.innerHTML=list.map(p=>`
    <div class="player-card">
      <div class="pc-name">${p.name}</div>
      <div class="pc-en">${p.nameEN}</div>
      <div class="pc-tags">
        <span class="pc-tag pos-${p.position}">${POS[p.position]}</span>
        <span class="pc-tag">${p.nationality}</span>
        <span class="pc-tag">${p.team}</span>
        <span class="pc-tag">${p.height}cm</span>
        <span class="pc-tag">#${p.number}</span>
        <span class="pc-tag${p.status==='退役'?' retired':''}">${p.status}</span>
      </div>
    </div>`).join('');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('statsOverlay').classList.contains('open')) closeStatsModal();
    else closeModal();
  }
});

renderHistoryLabel();
startNewGame();
</script>
